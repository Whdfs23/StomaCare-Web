<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StomaCare - Register</title>
        <link rel="stylesheet" href="register_style.css" />
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <main class="main-card">
            <!-- LEFT PANEL -->
            <section class="left-panel">
                <div class="welcome-content">
                    <h1>Welcome Back!</h1>
                    <p>
                        To keep connected with us please login with your
                        personal info
                    </p>
                    <button class="btn-login">Login</button>
                </div>

                <div class="stomach-container">
                    <i class="fas fa-stethoscope stomach-icon"></i>
                </div>
            </section>

            <!-- RIGHT PANEL -->
            <section class="right-panel">
                <h2 class="title">Register</h2>

                <div class="social-icons">
                    <button class="social-btn facebook" title="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button class="social-btn google" title="Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="social-btn linkedin" title="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </button>
                </div>

                <p class="subtitle">or use your email for registration</p>

                <form class="register-form">
                    <div class="input-box">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" placeholder="Name" />
                    </div>

                    <div class="input-box">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" placeholder="Email" />
                    </div>

                    <div class="input-box">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="passwordInput"
                            placeholder="Password"
                        />
                        <i
                            class="fas fa-eye eye-toggle"
                            id="eyeToggle"
                            onclick="togglePassword()"
                        ></i>
                    </div>

                    <button type="submit" class="btn-register">Register</button>
                </form>
            </section>
        </main>

        <script>
            function togglePassword() {
                const input = document.getElementById("passwordInput");
                const icon = document.getElementById("eyeToggle");
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>
    </body>
</html>
