<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/authentication.css"/>
</head>
<body>
    
</body>
</html>
<!-- Page Registration -->
    <div class="card" id="card">
        <section class="form-panel panel-register" id="panelRegister">
            <h2>Register</h2>
            <div class="social-row">
                <button class="s-btn fb" ><i class="fab fa-facebook-f"></i></button>
                <button class="s-btn goo"><i class="fab fa-google"></i></button>
                <button class="s-btn li" ><i class="fab fa-linkedin-in"></i></button>
    </div>
    <p class="sub-label">or use your email for registration</p>

    <div class="inp"><i class="fas fa-user ico"></i><input type="text" placeholder="Name"/></div>
    <div class="inp"><i class="fas fa-envelope ico"></i><input type="email" placeholder="Email"/></div>
    <div class="inp">
        <i class="fas fa-lock ico"></i>
        <input type="password" id="rPass" placeholder="Password"/>
        <i class="fas fa-eye eye" id="rEye"></i>
    </div>

    <button class="btn-main" id="btnRegister">Register</button>
    </section>

    <!-- ══ LOGIN FORM (starts on RIGHT) ══ -->
    <section class="form-panel panel-login" id="panelLogin">
        <h2>Login</h2>
        <div class="social-row">
        <button class="s-btn fb" ><i class="fab fa-facebook-f"></i></button>
        <button class="s-btn goo"><i class="fab fa-google"></i></button>
        <button class="s-btn li" ><i class="fab fa-linkedin-in"></i></button>
        </div>
        <p class="sub-label">or use your email to sign in</p>

        <div class="inp"><i class="fas fa-envelope ico"></i><input type="email" placeholder="Email"/></div>
        <div class="inp">
        <i class="fas fa-lock ico"></i>
        <input type="password" id="lPass" placeholder="Password"/>
        <i class="fas fa-eye eye" id="lEye"></i>
        </div>
        <p class="forgot">Forgot your password?</p>

        <button class="btn-main" id="btnLogin">Login</button>
    </section>

    <!-- ══ SLIDING OVERLAY ══ -->
    <div class="overlay" id="overlay">
        <div class="ov-circle c1"></div>
        <div class="ov-circle c2"></div>
        <div class="ov-circle c3"></div>
        <i class="fas fa-stethoscope deco-ico"></i>
        <div class="ov-content" id="ovContent">
            <h1 id="ovTitle">Hello,<br>Friend!</h1>
            <p  id="ovDesc">Don’t have an account? Enter your personal details and start your journey with us</p>
            <button class="btn-switch" id="switchBtn">Login</button>
        </div>
    </div>

    </div>

    <script src="js/authentication.js"></script>
</body>
</html>
