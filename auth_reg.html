<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StomaCare - Register</title>
    <link rel="stylesheet" href="register.css" />
</head>
<body>
    <main class="main-card">
        
        <section class="left-panel">
            <div class="welcome-content">
                <h1>Welcome Back!</h1>
                <p>To keep connected with us please login with your personal info</p>
                <button class="btn-login">Login</button>
            </div>
            
            <div class="stomach-container">
                <img src="img/stomach.png" alt="Stomach Icon" />
            </div>
        </section>

        <section class="right-panel">
            <h2 class="title">Register</h2>
            
            <div class="social-icons">
                <img src="img/fb-icon.png" alt="FB" />
                <img src="img/google-icon.png" alt="Google" />
                <img src="img/linkin-icon.png" alt="LinkedIn" />
            </div>

            <p class="subtitle">or use your email for registration</p>

            <form class="register-form">
                <div class="input-box">
                    <img src="img/1727545-removebg.png" class="input-icon" />
                    <input type="text" placeholder="Name" />
                </div>
                
                <div class="input-box">
                    <img src="img/email-icon" class="input-icon" />
                    <input type="email" placeholder="Email" />
                </div>

                <div class="input-box">
                    <img src="img/password-icon.png" class="input-icon" />
                    <input type="password" placeholder="Password" />
                    <img src="img/eye-off.png" class="eye-toggle" />
                </div>

                <button type="submit" class="btn-register">Register</button>
            </form>
        </section>

    </main>
</body>
</html>
