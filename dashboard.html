<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StomaCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50">

    <nav class="bg-white py-4 px-8 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#458b68] rounded-full flex items-center justify-center text-white"><i
                    class="fas fa-stomach"></i></div>
            <span class="font-bold text-[#458b68]">StomaCare Panel</span>
        </div>
        <a href="index.html" class="text-gray-400 text-sm">Logout</a>
    </nav>

    <div class="px-8 py-10 max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold">Halo, User!</h1>
                <p class="text-gray-500 text-sm">Berikut adalah ringkasan kesehatan lambungmu.</p>
            </div>
            <a href="mahasiswa.html"
                class="bg-[#458b68] text-white px-6 py-2 rounded-lg font-semibold hover:brightness-110 transition-all">
                <i class="fas fa-users mr-2"></i> Kelola Data
            </a>
        </div>

        <div class="grid md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card">
                <p class="text-xs text-gray-400 uppercase font-bold">Total Pasien</p>
                <h3 class="text-3xl font-bold text-[#458b68]">1,240</h3>
            </div>
            <div class="stat-card">
                <p class="text-xs text-gray-400 uppercase font-bold">Pengecekan Hari Ini</p>
                <h3 class="text-3xl font-bold text-blue-500">45</h3>
            </div>
            <div class="stat-card">
                <p class="text-xs text-gray-400 uppercase font-bold">Status Sistem</p>
                <h3 class="text-3xl font-bold text-green-500">Normal</h3>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <h4 class="font-bold mb-4">Aktivitas Terakhir</h4>
            <div class="text-sm text-gray-400 text-center py-10">Data aktivitas akan muncul di sini...</div>
        </div>
    </div>

</body>

</html>
